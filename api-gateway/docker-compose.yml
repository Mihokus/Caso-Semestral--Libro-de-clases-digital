services:
  gateway-db:
    image: postgres:16-alpine
    container_name: gateway-db
    environment:
      POSTGRES_DB: gateway_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - gateway_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gateway_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api-gateway:
    build: .
    container_name: api-gateway
    depends_on:
      gateway-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://gateway-db:5432/gateway_db
      DB_USER: postgres
      DB_PASS: postgres
    restart: unless-stopped

volumes:
  gateway_db_data:
