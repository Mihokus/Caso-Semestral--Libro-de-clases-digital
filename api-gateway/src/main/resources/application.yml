server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gateway_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: asistencia
              uri: http://asistencia-app:8081
              predicates:
                - Path=/api/alumnos/**,/api/asistencia/**,/api/anotaciones/**
            - id: mensajeria
              uri: http://mensajeria-app:8083
              predicates:
                - Path=/api/mensajes/**
            - id: academic
              uri: http://academic-service:8084
              predicates:
                - Path=/api/academica/**

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-this-needs-to-be-at-least-32-bytes-long-for-hs256}
  expiration: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
