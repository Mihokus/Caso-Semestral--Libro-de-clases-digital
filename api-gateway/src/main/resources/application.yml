server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gateway_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: bff
              uri: ${BFF_URL:http://bff:8085}
              predicates:
                - Path=/api/alumnos/**,/api/cursos/**,/api/asistencia/**,/api/anotaciones/**,/api/mensajes/**,/api/asignaturas/**,/api/notas/**,/api/dashboard

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-this-needs-to-be-at-least-32-bytes-long-for-hs256}
  expiration: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
